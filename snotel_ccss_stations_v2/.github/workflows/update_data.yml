name: Update Station Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily — SNOTEL data is typically finalized by then

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Conda environment
        uses: mamba-org/setup-micromamba@v1
        with:
          cache-environment: true
          environment-file: environment.yml

      - name: Update station CSV files
        run: python snotel_ccss_stations/update_data.py

      - name: Generate live SWE % normal map
        run: python snotel_ccss_stations/generate_swe_map.py
        # Note: generate_swe_map.py is a port of the v1 map generator;
        # it will be added in a follow-up commit.
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --global user.email "egagli@uw.edu"
          git config --global user.name "Eric Gagliano"
          git pull --rebase
          git add data/ all_stations.geojson live_swe_map.html || true
          git diff --staged --exit-code || \
            git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
